model: Task
table: tasks

options:
  belongs_to_organization: false
  soft_deletes: true
  audit_trail: false

columns:
  title:
    type: string
    nullable: false
    filterable: true
    sortable: true
    searchable: true
  description:
    type: text
    nullable: true
  status:
    type: string
    nullable: false
    default: "todo"
    filterable: true
    sortable: true
  priority:
    type: string
    nullable: false
    default: "medium"
    filterable: true
    sortable: true
  estimated_hours:
    type: decimal
    precision: 8
    scale: 2
    nullable: true
  due_date:
    type: date
    nullable: true
    sortable: true
  project_id:
    type: foreignId
    foreign_model: Project
  assignee_id:
    type: foreignId
    foreign_model: User
    nullable: true

relationships:
  - type: belongsTo
    model: Project
  - type: belongsTo
    model: User
    foreign_key: assignee_id
  - type: hasMany
    model: Comment

permissions:
  owner:
    actions: [index, show, store, update, destroy, trashed, restore, forceDelete]
    show_fields: "*"
    create_fields: &owner_task_writable
      - title
      - description
      - status
      - priority
      - estimated_hours
      - due_date
      - project_id
      - assignee_id
    update_fields: *owner_task_writable

  admin:
    actions: [index, show, store, update, destroy, trashed, restore]
    show_fields: "*"
    create_fields: *owner_task_writable
    update_fields: *owner_task_writable

  manager:
    actions: [index, show, store, update]
    show_fields: "*"
    create_fields: *owner_task_writable
    update_fields: *owner_task_writable

  member:
    actions: [index, show, update]
    show_fields:
      - id
      - title
      - description
      - status
      - priority
      - due_date
      - project_id
      - assignee_id
    create_fields: []
    update_fields:
      - status
      - description
    hidden_fields:
      - estimated_hours

  viewer:
    actions: [index, show]
    show_fields:
      - id
      - title
      - description
      - status
      - priority
      - due_date
      - project_id
      - assignee_id
    create_fields: []
    update_fields: []
    hidden_fields:
      - estimated_hours
